name: calculator
description: 数学计算器技能，支持基础运算、数学函数和常量，通过 uv run 执行
version: 1.0.0
tags:
  - calculator
  - math
  - uv

# 技能指导
content: |
  你可以使用计算器技能执行数学计算。
  
  核心功能：
  - calculate: 计算数学表达式（通过 uv run 执行）
  
  支持的运算：
  ✅ 基础运算：+, -, *, /, //, %, **
  ✅ 数学函数：sqrt, sin, cos, tan, log, exp, abs, round 等
  ✅ 数学常量：pi, e
  
  使用示例：
  - "2 + 3 * 4" → 14
  - "sqrt(16)" → 4
  - "sin(pi/2)" → 1.0
  - "log(100, 10)" → 2.0
  - "2 ** 10" → 1024
  
  技术特性：
  - 使用 uv run 执行独立脚本（环境隔离）
  - AST 解析，防止代码注入（安全）
  - 支持异步和同步调用
  
  注意事项：
  - 表达式必须是有效的 Python 数学表达式
  - 只支持数学运算，不支持其他 Python 代码

# 工具定义
tools:
  - name: calculate
    description: 计算数学表达式，支持基础运算、数学函数和常量
    module: calculator
    function: calculate
    parameters:
      expression:
        type: string
        description: 数学表达式（如 "2 + 3", "sqrt(16)", "sin(pi/2)"）

# 依赖项
dependencies:
  - uv>=0.1.0

